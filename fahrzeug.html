<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Status setzen</h2>

<select onchange="setStatus(this.value)">
<option value="1">1 Einsatzbereit Funk</option>
<option value="2">2 Wache</option>
<option value="3">3 Anfahrt</option>
<option value="4">4 Einsatzort</option>
<option value="6">6 Nicht bereit</option>
</select>

<script type="module">
import { db, auth } from "./firebase.js";
import { updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.setStatus = async (s) => {
  const user = auth.currentUser;
  if (!user) return;

  await updateDoc(doc(db,"vehicles", user.uid), {
    status: Number(s)
  });
};
</script>

</body>
</html>
