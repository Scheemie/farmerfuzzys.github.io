<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login">

<div class="login-box">
<h1>FIRE DISPATCHER</h1>

<input id="username" placeholder="Benutzername">
<input id="password" type="password" placeholder="Passwort">

<button onclick="login()">ANMELDEN</button>

<p id="error"></p>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.login = async () => {
  try {
    const email = username.value + "@farmerfuzzys.local";

    const user = await signInWithEmailAndPassword(auth, email, password.value);

    const snap = await getDoc(doc(db,"users", user.user.uid));
    const roles = snap.data().role;

    localStorage.setItem("roles", JSON.stringify(roles));

    window.location.href = "dashboard.html";

  } catch (e) {
    error.innerText = "Login fehlgeschlagen";
  }
};
</script>

</body>
</html>
