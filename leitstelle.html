<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">
<h2>Einsatz erstellen</h2>

<input id="ort" placeholder="Ort">
<input id="stichwort" placeholder="Stichwort">
<input id="info" placeholder="Info">

<button onclick="alarm()">Senden</button>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.alarm = async () => {
  await setDoc(doc(db,"system","alarm"), {
    ort: ort.value,
    stichwort: stichwort.value,
    info: info.value
  });
};
</script>

</body>
</html>
