<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body class="display">

<div class="topbar">
<div id="clock"></div>
<div id="date"></div>
</div>

<div class="layout">

<div class="vehicles" id="vehicles"></div>

<div class="center" id="alarm">
Keine aktiven Einsätze
</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const statusColor = {
  1:"green", 2:"green",
  3:"orange", 4:"red",
  6:"gray"
};

// Fahrzeuge
onSnapshot(collection(db,"vehicles"), snap => {
  vehicles.innerHTML = "";

  snap.forEach(d => {
    const v = d.data();

    vehicles.innerHTML += `
      <div class="vehicle ${statusColor[v.status] || ''}">
        ${v.name}
      </div>
    `;
  });
});

// Einsatz
onSnapshot(doc(db,"system","alarm"), snap => {
  if (!snap.exists()) return;

  const a = snap.data();
  alarm.innerHTML = `
    <h1>${a.stichwort}</h1>
    <p>${a.ort}</p>
  `;
});

// Uhr
setInterval(() => {
  const now = new Date();
  clock.innerText = now.toLocaleTimeString();
  date.innerText = now.toLocaleDateString();
},1000);
</script>

</body>
</html>
